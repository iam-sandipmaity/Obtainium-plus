name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      beta:
        type: boolean
        description: Is beta?

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '21'

      - name: Flutter Doctor
        id: flutter_doctor
        run: |
          flutter doctor -v

      - name: Prepare Release Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks
          else
            echo "Release signing secrets are missing. Generating a temporary CI signing key."
            echo "APKs from this run will install, but cannot update APKs signed with another key."
            ANDROID_KEY_ALIAS="obtainium-plus-ci"
            ANDROID_KEYSTORE_PASSWORD="$(openssl rand -hex 16)"
            ANDROID_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            keytool -genkeypair \
              -keystore android/release-keystore.jks \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Obtainium Plus CI,O=Obtainium Plus,C=US"
          fi
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../release-keystore.jks
          EOF

      - name: Extract Version
        id: extract_version      
        run: |
          VERSION=$(grep -oP "^version: [^\+]+" pubspec.yaml | tail -c +10)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ inputs.beta || 'false' }}" = "true" ]; then BETA=true; else BETA=false; fi
          echo "beta=$BETA" >> $GITHUB_OUTPUT
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then TAG="$GITHUB_REF_NAME"; else TAG="v$VERSION"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build APKs
        run: |
          flutter build apk --flavor normal && flutter build apk --split-per-abi --flavor normal
          for file in build/app/outputs/flutter-apk/app-*normal*.apk*; do mv "$file" "${file//-normal/}"; done
          flutter build apk --flavor fdroid -t lib/main_fdroid.dart && flutter build apk --split-per-abi --flavor fdroid -t lib/main_fdroid.dart
          rm ./build/app/outputs/flutter-apk/*.sha1
          sha256sum ./build/app/outputs/flutter-apk/*.apk > ./build/app/outputs/flutter-apk/SHA256SUMS
          ls -l ./build/app/outputs/flutter-apk/

      - name: Save Signed APKs as Action Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: build/app/outputs/flutter-apk/*

      - name: Create Tag
        env:
          TAG: "${{ steps.extract_version.outputs.tag }}"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
      
      - name: Create Draft Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ github.token }}
          tag: "${{ steps.extract_version.outputs.tag }}"
          prerelease: "${{ steps.extract_version.outputs.beta }}"
          draft: "true"
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "build/app/outputs/flutter-apk/*.apk,build/app/outputs/flutter-apk/SHA256SUMS"
